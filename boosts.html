<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Boosts - LoulouBoost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdfdfd; overflow-x: hidden; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .hover-lift { transition: transform 0.3s ease, shadow 0.3s ease; }
        .hover-lift:hover { transform: translateY(-10px); }
    </p>
</head>
<body class="text-[#1A1A1A]">

    <nav class="fixed top-0 w-full z-50 glass-nav border-b border-gray-100">
        <div class="flex justify-between items-center px-6 py-4 max-w-6xl mx-auto">
            <a href="index.html" class="w-12 h-12 rounded-full border-2 border-white shadow-md overflow-hidden bg-[#f8f6f2]">
                <img src="logo.png" alt="LoulouBoost" class="w-full h-full object-cover">
            </a>
            <div class="hidden md:flex items-center gap-8 font-semibold text-sm">
                <a href="qui.html" class="text-gray-400 hover:text-black transition">Loulou qui ?</a>
                <a href="boosts.html" class="text-black underline decoration-[#E9664D] decoration-2 underline-offset-8">Les Boosts</a>
                <a href="temoignages.html" class="text-gray-400 hover:text-black transition">Témoignages</a>
                <a href="contact.html" class="bg-[#D58490] text-black px-6 py-2.5 rounded-full shadow-lg hover:bg-[#E9664D] hover:text-white transition duration-300 transform hover:scale-105 active:scale-95 font-bold">
                    Prêt à booster
                </a>
            </div>
        </div>
    </nav>

    <header class="max-w-5xl mx-auto text-center mt-32 px-6" data-aos="fade-up">
        <div class="inline-block px-5 py-2 mb-8 text-sm font-extrabold tracking-widest uppercase rounded-full" 
             style="color: #4A5548; background-color: #f8f6f2; border: 1px solid #4A554830;">
            Les Accompagnements
        </div>
        <h1 class="text-5xl md:text-7xl font-extrabold mb-8 leading-tight" style="color: #4A5548;">
            Vos <span style="color: #E9664D;" class="italic">Boosts</span><br>sur-mesure.
        </h1>
        <p class="text-xl text-gray-500 max-w-2xl mx-auto mb-10 leading-relaxed">
            Sublimons votre singularité en votre <span class="text-[#4A5548] font-bold">plus beau rayonnement.</span>
        </p>
    </header>

    <section class="max-w-6xl mx-auto px-6 py-16">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div data-aos="fade-up" data-aos-delay="100" class="hover-lift bg-white rounded-[3rem] p-10 shadow-xl border border-gray-100">
                <span class="text-[#E9664D] font-bold text-xs uppercase tracking-widest">Le Pack Lancement</span>
                <h3 class="text-2xl font-bold mt-2 mb-4" style="color: #4A5548;">Coup de Boost</h3>
                <div class="text-2xl font-black mb-8">1100€ <span class="text-sm font-normal text-gray-400">HT</span></div>
                <ul class="space-y-3 mb-10 text-sm">
                    <li>✨ Audit / Benchmark</li>
                    <li>✨ Refonte bio & Paramétrage</li>
                    <li>✨ 9 publications incluses</li>
                </ul>
                <a href="#" class="block text-center py-4 rounded-full font-bold border-2 border-[#D58490] text-[#D58490] hover:bg-[#D58490] hover:text-white transition italic">Je veux ce pack</a>
            </div>

            <div data-aos="fade-up" data-aos-delay="200" class="hover-lift bg-[#4A5548] rounded-[3rem] p-10 shadow-2xl md:scale-110 relative text-white">
                <div class="absolute top-6 right-6 bg-[#E9664D] text-white text-[10px] font-bold px-3 py-1 rounded-full">LE PLUS COMPLET</div>
                <h3 class="text-2xl font-bold mt-2 mb-4 italic">Booste ta com'</h3>
                <div class="mb-8">
                    <span class="block text-3xl font-black italic">580€ <span class="text-sm font-normal opacity-60">HT / mois</span></span>
                </div>
                <ul class="space-y-3 mb-10 text-sm">
                    <li>✅ 2 à 3 publications / semaine</li>
                    <li>✅ Shooting / Tournage inclus</li>
                    <li>✅ Reporting trimestriel</li>
                </ul>
                <a href="#" class="block text-center py-4 rounded-full font-bold bg-[#E9664D] text-white shadow-lg transition italic">Booster ma com'</a>
            </div>

            <div data-aos="fade-up" data-aos-delay="300" class="hover-lift bg-white rounded-[3rem] p-10 shadow-xl border border-gray-100">
                <span class="text-[#E9664D] font-bold text-xs uppercase tracking-widest">Création One Shot</span>
                <h3 class="text-2xl font-bold mt-2 mb-4" style="color: #4A5548;">Boost Minute</h3>
                <div class="grid grid-cols-2 gap-4 mb-8 text-center">
                    <div class="p-3 bg-[#f8f6f2] rounded-2xl font-black">220€</div>
                    <div class="p-3 bg-[#f8f6f2] rounded-2xl font-black">260€</div>
                </div>
                <a href="#" class="block text-center py-4 rounded-full font-bold border-2 border-[#D58490] text-[#D58490] hover:bg-[#D58490] hover:text-white transition italic">Réserver</a>
            </div>
        </div>
    </section>

    <div class="max-w-3xl mx-auto px-6 mb-24" data-aos="zoom-in">
        <div class="flex items-center gap-4 bg-[#f8f6f2] p-6 rounded-3xl border-l-8 border-[#E9664D] shadow-sm">
            <span class="text-3xl">🎨</span>
            <p class="italic text-[#4A5548]"><strong>Besoin de visuels ?</strong> Je collabore avec des graphistes de confiance pour vos besoins spécifiques.</p>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1000,
            once: true,
            offset: 100
        });
    </script>
</body>
</html>
